<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">

    <!-- TIME CARD -->
    <div class="time-card">
      <div id="time" class="time">00:00:00</div>
      <div id="date" class="date">Loading date...</div>
      <div class="greeting">
        <span id="greeting-text">Good Morning</span>, 
        <span id="user-name" onclick="editName()">(klik untuk ubah nama)</span>
      </div>
    </div>

    <div class="main-grid">
      <!-- Focus Timer -->
      <div class="card timer-card">
        <h2>Focus Timer</h2>
        <div id="timer" class="timer-display">25:00</div>
        <div class="timer-buttons">
          <button onclick="startTimer()">Start</button>
          <button onclick="pauseTimer()">Stop</button>
          <button onclick="resetTimer()">Reset</button>
        </div>
        <div class="custom-time">
          <label>Pomodoro (menit):</label>
          <input type="number" id="custom-minutes" value="25" min="1" max="60">
          <button onclick="changePomodoroTime()">Ubah</button>
        </div>
      </div>

      <!-- Tasks -->
      <div class="card tasks-card">
        <h2>Tasks</h2>
        <div class="add-task">
          <input type="text" id="task-input" placeholder="Add a new task...">
          <button onclick="addTask()">Add</button>
        </div>
        <ul id="task-list"></ul>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="card quick-card">
      <h2>Quick Links</h2>
      <div class="add-link">
        <input type="text" id="link-name" placeholder="Link name">
        <input type="text" id="link-url" placeholder="https://...">
        <button onclick="addQuickLink()">Add Link</button>
      </div>
      <div id="links-container" class="links-container"></div>
    </div>

  </div>

  <!-- CUSTOM MODAL ESTETIK -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 id="modal-title"></h3>
      <input type="text" id="modal-input" placeholder="Ketik di sini...">
      <div class="modal-buttons">
        <button onclick="hideModal()" class="cancel-btn">Batal</button>
        <button id="modal-confirm-btn" onclick=""></button>
      </div>
    </div>
  </div>

  <button id="theme-toggle" onclick="toggleTheme()">🌙</button>

  <script src="js/app.js"></script>
</body>
</html>
